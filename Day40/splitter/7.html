<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Performance Race: Search Strategies</title>
    <script src="https://tailwindcss.com"></script>
</head>
<body class="bg-slate-900 text-slate-100 p-4 md:p-10">
    <div class="max-w-3xl mx-auto bg-slate-800 p-8 rounded-2xl shadow-2xl border border-slate-700">
        <header class="text-center mb-8">
            <h1 class="text-3xl font-black tracking-tight text-white mb-2">PERFORMANCE RACE 🏎️</h1>
            <p class="text-slate-400">Comparing Search Optimization Strategies</p>
        </header>

        <!-- Strategy Selector -->
        <div class="flex flex-wrap justify-center gap-3 mb-8" id="strategy-control">
            <button class="strat-btn px-6 py-2 rounded-full font-bold bg-blue-600 text-white shadow-lg shadow-blue-900/20" data-type="none">Normal</button>
            <button class="strat-btn px-6 py-2 rounded-full font-bold bg-slate-700 hover:bg-slate-600 transition" data-type="debounce">Debounce</button>
            <button class="strat-btn px-6 py-2 rounded-full font-bold bg-slate-700 hover:bg-slate-600 transition" data-type="throttle">Throttle</button>
            <button class="strat-btn px-6 py-2 rounded-full font-bold bg-slate-700 hover:bg-slate-600 transition" data-type="memo">Memoized</button>
        </div>

        <!-- Search Input -->
        <div class="relative mb-8">
            <input type="text" id="search-input" 
                   placeholder="Type to search 10,000 items..." 
                   class="w-full bg-slate-900 border-2 border-slate-700 rounded-xl p-4 text-lg focus:border-blue-500 focus:ring-2 focus:ring-blue-900 outline-none transition-all">
            <div id="loading-bar" class="absolute bottom-0 left-0 h-1 bg-blue-500 w-0 transition-all duration-300"></div>
        </div>

        <!-- Live Metrics Dashboard -->
        <div class="grid grid-cols-1 md:grid-cols-3 gap-4 mb-8">
            <div class="bg-slate-900/50 p-4 rounded-xl border border-slate-700 text-center">
                <span class="block text-xs uppercase tracking-widest text-slate-500 mb-1">Function Calls</span>
                <span id="call-count" class="text-3xl font-mono font-bold text-blue-400">0</span>
            </div>
            <div class="bg-slate-900/50 p-4 rounded-xl border border-slate-700 text-center">
                <span class="block text-xs uppercase tracking-widest text-slate-500 mb-1">Exec Time</span>
                <span id="exec-time" class="text-3xl font-mono font-bold text-emerald-400">0.00ms</span>
            </div>
            <div class="bg-slate-900/50 p-4 rounded-xl border border-slate-700 text-center">
                <span class="block text-xs uppercase tracking-widest text-slate-500 mb-1">UI Smoothness</span>
                <span id="ui-status" class="text-sm font-bold text-amber-400 uppercase">Detecting...</span>
            </div>
        </div>

        <!-- Results Preview -->
        <div>
            <h3 class="text-slate-500 text-xs font-bold uppercase mb-3">Live Results (Top 5)</h3>
            <ul id="results-list" class="space-y-2 min-h-[160px]">
                <li class="text-slate-600 italic">Start typing to see results...</li>
            </ul>
        </div>
    </div>

    <script>
        // 1. Generate Dummy Data (10,000 items)
        const DATA = Array.from({ length: 10000 }, (_, i) => ({
            id: i,
            name: `Product_${i}_${Math.random().toString(36).substr(2, 5)}`,
            category: ['Electronics', 'Home', 'Fashion', 'Toys'][Math.floor(Math.random() * 4)]
        }));

        let currentStrategy = 'none';
        let callTotal = 0;
        const memoCache = new Map();

        // 2. Heavy Search Logic (Simulated)
        function heavySearch(query) {
            const start = performance.now();
            callTotal++;
            
            // Artificial delay to simulate complex filtering/UI lag
            const results = DATA.filter(item => 
                item.name.toLowerCase().includes(query.toLowerCase())
            ).slice(0, 5);

            const end = performance.now();
            updateUI(results, (end - start).toFixed(2), false);
        }

        // 3. Optimization Utilities
        const debounce = (fn, delay) => {
            let timer;
            return (...args) => {
                clearTimeout(timer);
                timer = setTimeout(() => fn(...args), delay);
            };
        };

        const throttle = (fn, limit) => {
            let inThrottle;
            return (...args) => {
                if (!inThrottle) {
                    fn(...args);
                    inThrottle = true;
                    setTimeout(() => inThrottle = false, limit);
                }
            };
        };

        // 4. Strategy Handlers
        const debouncedSearch = debounce(heavySearch, 400);
        const throttledSearch = throttle(heavySearch, 400);

        function memoizedSearch(query) {
            if (memoCache.has(query)) {
                callTotal++;
                updateUI(memoCache.get(query), "0.01", true);
            } else {
                const results = DATA.filter(item => 
                    item.name.toLowerCase().includes(query.toLowerCase())
                ).slice(0, 5);
                memoCache.set(query, results);
                heavySearch(query);
            }
        }

        // 5. DOM Interaction
        const input = document.getElementById('search-input');
        const list = document.getElementById('results-list');
        const callDisplay = document.getElementById('call-count');
        const timeDisplay = document.getElementById('exec-time');
        const uiStatus = document.getElementById('ui-status');

        input.addEventListener('input', (e) => {
            const val = e.target.value;
            if (!val) { resetStats(); return; }

            if (currentStrategy === 'none') heavySearch(val);
            if (currentStrategy === 'debounce') debouncedSearch(val);
            if (currentStrategy === 'throttle') throttledSearch(val);
            if (currentStrategy === 'memo') memoizedSearch(val);
        });

        function updateUI(items, time, isCached) {
            callDisplay.textContent = callTotal;
            timeDisplay.textContent = `${time}ms ${isCached ? '(⚡)' : ''}`;
            
            // Smoothness Logic: If calls happen too fast, UI might lag
            uiStatus.textContent = currentStrategy === 'none' ? '⚠️ High Load' : '✅ Optimized';
            uiStatus.className = currentStrategy === 'none' ? 'text-sm font-bold text-red-500' : 'text-sm font-bold text-emerald-400';

            list.innerHTML = items.length ? items.map(item => `
                <li class="p-3 bg-slate-700/30 rounded-lg border border-slate-700 flex justify-between">
                    <span class="text-blue-300 font-mono">${item.name}</span>
                    <span class="text-slate-500 text-xs">${item.category}</span>
                </li>
            `).join('') : `<li class="text-slate-500">No matches found.</li>`;
        }

        function resetStats() {
            callTotal = 0;
            callDisplay.textContent = '0';
            timeDisplay.textContent = '0.00ms';
            list.innerHTML = `<li class="text-slate-600 italic">Start typing to see results...</li>`;
        }

        // Button Toggles
        document.querySelectorAll('.strat-btn').forEach(btn => {
            btn.addEventListener('click', (e) => {
                document.querySelectorAll('.strat-btn').forEach(b => {
                    b.classList.remove('bg-blue-600', 'text-white', 'shadow-blue-900/20');
                    b.classList.add('bg-slate-700');
                });
                e.target.classList.add('bg-blue-600', 'text-white');
                currentStrategy = e.target.dataset.type;
                resetStats();
                input.value = '';
                input.focus();
            });
        });
    </script>
</body>
</html>
